name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run all tests (core + android + desktop) — red test blocks the release
        run: ./gradlew test

      - name: Build release APK (signed, installable by tapping)
        run: ./gradlew :androidApp:assembleRelease -PbuildNumber=${{ github.run_number }}

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: spiewnik-release
          path: androidApp/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Śpiewnik build #${{ github.run_number }}"
          files: androidApp/build/outputs/apk/release/app-release.apk
          generate_release_notes: false
          body: |
            Automatyczny build z gałęzi main (release, podpisany stałym kluczem sideload — instalowalny przez kliknięcie).

            ⚠️ Jeśli masz zainstalowaną starszą wersję podpisaną innym kluczem (build #6 lub starszy), najpierw ją odinstaluj — inaczej Android zablokuje instalację (konflikt podpisów). Od tej wersji aktualizacje instalują się już w miejscu.

            Commit: ${{ github.sha }}
